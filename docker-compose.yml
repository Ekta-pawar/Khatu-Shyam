services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: khatu-backend

    ports:
      - "5001:5000"

    env_file:
      - ./backend/.env

    volumes:
      - ./backend:/app
      - /app/node_modules

    working_dir: /app

    command: npm run dev

    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true

    restart: unless-stopped

  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile

    container_name: khatu-frontend

    ports:
      - "5174:5173"

    env_file:
      - ./ui/.env

    volumes:
      - ./ui:/app
      - /app/node_modules

    working_dir: /app

    command: npm run dev -- --host

    environment:
      - CHOKIDAR_USEPOLLING=true

    depends_on:
      - backend

    restart: unless-stopped